apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata: # kpt-merge: oai-ran-cuup/cuup-ran-n3
  name: cuup-ran-n3
  namespace: oai-ran-cuup
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    internal.kpt.dev/upstream-identifier: 'k8s.cni.cncf.io|NetworkAttachmentDefinition|oai-ran-cuup|cuup-ran-n3'
spec:
  config: |
    {
      "cniVersion": "0.3.1",
      "name": "cuup-edge-n3",
      "plugins": [
        {
          "type": "ipvlan",
          "capabilities": {
            "ips": true
          },
          "master": "CUUP_N3_MULTUSPARENTINTERFACE",
          "mode": "l2",
          "ipam": {
            "type": "static",
            "routes": [{ "dst": "UPF_N3_NETWORKADDRESS", "gw": "CUUP_N3_GW" }]
          }
        }
      ]
    }
---
