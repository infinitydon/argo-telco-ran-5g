apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata: # kpt-merge: oai-ran-cucp/cucp-ran-n2
  name: cucp-ran-n2
  namespace: oai-ran-cucp
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    internal.kpt.dev/upstream-identifier: 'k8s.cni.cncf.io|NetworkAttachmentDefinition|oai-ran-cucp|cucp-ran-n2'
spec:
  config: |
    {
      "cniVersion": "0.3.1",
      "name": "cucp-ran-n2",
      "plugins": [
        {
          "type": "ipvlan",
          "capabilities": {
            "ips": true
          },
          "master": "CUCP_N2_MULTUSPARENTINTERFACE",
          "mode": "l2",
          "ipam": {
            "type": "static",
            "routes": [{ "dst": "AMF_N2_NETWORKADDRESS", "gw": "CUCP_N2_GW" }]
          }
        }
      ]
    }
---
